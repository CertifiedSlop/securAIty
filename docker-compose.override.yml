# Docker Compose override for development
# Usage: docker-compose -f docker-compose.yml -f docker-compose.override.yml up

services:
  app:
    build:
      target: development
    environment:
      APP_ENV: development
      DEBUG: "True"
      LOG_LEVEL: DEBUG
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
    ports:
      - "8000:8000"
      - "5678:5678"
    command: ["-m", "uvicorn", "src.securAIty.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  natss:
    command:
      - -c
      - /etc/nats/nats.conf
      - -js
      - -DV

  postgres:
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust

  vault:
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: hvs.dev-token-insecure-development-only
