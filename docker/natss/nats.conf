port: 4222
http_port: 8222

server_name: securAIty-natss

jetstream {
    store_dir: /data/nats/jetstream
    max_memory_store: 256MB
    max_file_store: 1GB
    sync_interval: "1m"
    
    limits {
        max_ack_pending: 10000
        max_ha_assets: 100
        max_request_batch: 1000
        duplicate_window: "2m"
    }
}

accounts {
    SECURITY {
        users = [
            { user: security_manager, password: secure_password_2024 }
        ]
        
        jetstream {
            max_memory: 128MB
            max_file: 512MB
            max_streams: 10
            max_consumers: 100
            max_ack_pending: 5000
        }
        
        exports = [
            { stream: "security.>" }
        ]
        
        imports = [
        ]
    }
    
    SYSTEM {
        users = [
            { user: sys_monitor, password: monitor_password_2024 }
        ]
    }
}

authorization {
    timeout: 5
    default_permissions {
        publish = ["_INBOX.>"]
        subscribe = ["_INBOX.>", "security.>"]
    }
}

cluster {
    name: security-cluster
    port: 6222
    routes = []
}

leafnodes {
    port: 7422
}

websocket {
    port: 8080
    no_tls: true
}

logging {
    time: true
    debug: false
    trace: false
    log_file: "/data/nats/nats.log"
}

pid_file: "/var/run/nats/nats.pid"
